name: CI

permissions:
  contents: read

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test-emacs:
    name: emacs ${{ matrix.emacs }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        emacs: ['28.2', '29.4', '30.1', 'snapshot']
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
      - uses: purcell/setup-emacs@bdc64dc730ae1fcba200bfd52cb1b4cf6159cbe5  # master 2026-04-30
        with:
          version: ${{ matrix.emacs }}
      - uses: emacs-eask/setup-eask@dce23c0b7c54fb866f5ce8726a6ff5645cd7a92b  # master 2026-04-30
        with:
          version: 'snapshot'
      - name: install-deps
        run: eask install-deps --dev
      - name: byte-compile
        run: eask compile
      - name: tests
        run: eask test ert pending-test.el pending-aio-test.el
      - name: lint
        run: make lint EMACS=emacs
      - name: format-check
        run: make format-check EMACS=emacs
      - name: docs
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y texinfo
          make docs
      - name: upload-docs
        if: matrix.emacs == '30.1'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: pending-info
          path: doc/pending.info

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
      - uses: purcell/setup-emacs@bdc64dc730ae1fcba200bfd52cb1b4cf6159cbe5  # master 2026-04-30
        with:
          version: '30.1'
      - uses: emacs-eask/setup-eask@dce23c0b7c54fb866f5ce8726a6ff5645cd7a92b  # master 2026-04-30
        with:
          version: 'snapshot'
      - name: install-deps
        run: eask install-deps --dev
      - name: coverage
        run: make coverage
      - name: upload-coverage
        uses: codecov/codecov-action@b9fd7d16f6d7d1b5d2bec1a2887e65ceed900238  # v4.6.0
        with:
          files: ./coverage.lcov
          fail_ci_if_error: false

  nix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
      - uses: cachix/install-nix-action@ba0dd844c9180cbf77aa72a116d6fbc515d0e87b  # v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
      - name: nix flake check
        run: nix flake check --no-warn-dirty
      - name: nix build byte-compile
        run: nix build .#checks.x86_64-linux.byte-compile --no-warn-dirty
      - name: nix build tests
        run: nix build .#checks.x86_64-linux.tests --no-warn-dirty
      - name: nix build docs
        run: nix build .#checks.x86_64-linux.docs --no-warn-dirty || true
      - name: upload-docs-from-nix
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        if: always()
        with:
          name: nix-built-docs
          path: result-*

  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
      - run: |
          sudo apt-get install -y shellcheck
          shellcheck scripts/*.sh
