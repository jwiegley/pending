name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test-emacs:
    name: emacs ${{ matrix.emacs }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        emacs: ['28.2', '29.4', '30.1', 'snapshot']
    steps:
      - uses: actions/checkout@v4
      - uses: purcell/setup-emacs@master
        with:
          version: ${{ matrix.emacs }}
      - uses: emacs-eask/setup-eask@master
        with:
          version: 'snapshot'
      - name: install-deps
        run: eask install-deps --dev
      - name: byte-compile
        run: eask compile
      - name: tests
        run: eask test ert pending-test.el pending-aio-test.el
      - name: lint
        run: make lint EMACS=emacs
      - name: format-check
        run: make format-check EMACS=emacs
      - name: docs
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y texinfo
          make docs
      - name: upload-docs
        if: matrix.emacs == '30.1'
        uses: actions/upload-artifact@v4
        with:
          name: pending-info
          path: doc/pending.info

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: purcell/setup-emacs@master
        with:
          version: '30.1'
      - uses: emacs-eask/setup-eask@master
        with:
          version: 'snapshot'
      - name: install-deps
        run: eask install-deps --dev
      - name: coverage
        run: make coverage
      - name: upload-coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.lcov
          fail_ci_if_error: false

  nix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
      - name: nix flake check
        run: nix flake check --no-warn-dirty
      - name: nix build byte-compile
        run: nix build .#checks.x86_64-linux.byte-compile --no-warn-dirty
      - name: nix build tests
        run: nix build .#checks.x86_64-linux.tests --no-warn-dirty
      - name: nix build docs
        run: nix build .#checks.x86_64-linux.docs --no-warn-dirty || true
      - name: upload-docs-from-nix
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: nix-built-docs
          path: result-*

  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          sudo apt-get install -y shellcheck
          shellcheck scripts/*.sh
